services:
  - type: web
    name: task-manager-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        scope: run
      - key: JWT_SECRET
        scope: run
      - key: FRONTEND_URL
        scope: run
